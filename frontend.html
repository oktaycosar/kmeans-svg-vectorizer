<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vectorizer — K-Means + SVG</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f23;color:#e0e0e0;min-height:100vh;display:flex}
.sidebar{width:260px;background:#1a1a2e;padding:20px 16px;display:flex;flex-direction:column;gap:14px;border-right:1px solid #2a2a4a;flex-shrink:0}
.sidebar h2{font-size:1.2em;color:#7c8aff;margin-bottom:2px}
.sidebar .sub{font-size:0.72em;color:#666;margin-top:-10px}
.sidebar label{font-size:0.78em;color:#999;text-transform:uppercase;letter-spacing:0.5px}
.sidebar input[type=range]{width:100%;accent-color:#7c8aff}
.sidebar input[type=number]{width:100%;background:#0f0f23;border:1px solid #2a2a4a;color:#e0e0e0;padding:5px 8px;border-radius:6px;font-size:0.85em}
.row{display:flex;justify-content:space-between;align-items:center}
.range-val{font-size:0.8em;color:#7c8aff;text-align:right}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.toolbar{display:flex;gap:10px;padding:12px 20px;background:#1a1a2e;border-bottom:1px solid #2a2a4a;align-items:center}
.toolbar button,.toolbar .upload-btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:0.85em;font-weight:600;transition:all 0.2s}
.btn-primary{background:#7c8aff;color:#fff}
.btn-primary:hover{background:#5e6de0}
.btn-primary:disabled{background:#3a3a5a;color:#666;cursor:not-allowed}
.btn-secondary{background:#2a2a4a;color:#ccc}
.btn-secondary:hover{background:#3a3a5a}
.btn-secondary:disabled{background:#1a1a2e;color:#555;cursor:not-allowed}
.upload-btn{background:#0f0f23;color:#7c8aff;border:1px dashed #7c8aff!important;display:inline-flex;align-items:center;gap:6px}
.upload-btn input[type=file]{display:none}
.split{display:flex;flex:1;overflow:hidden}
.panel{flex:1;display:flex;align-items:center;justify-content:center;position:relative;min-height:200px;overflow:auto}
.panel img,.panel svg{max-width:none;max-height:95%;object-fit:contain}
.panel svg{background:#fff;border-radius:4px}
.panel-label{position:absolute;top:8px;left:8px;padding:3px 10px;border-radius:4px;font-size:0.72em;background:rgba(0,0,0,0.7);color:#aaa;z-index:2}
#svg-panel{background-image:linear-gradient(45deg,#222 25%,transparent 25%),linear-gradient(-45deg,#222 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#222 75%),linear-gradient(-45deg,transparent 75%,#222 75%);background-size:16px 16px;background-position:0 0,0 8px,8px -8px,-8px 0}
.stats{padding:8px 20px;background:#1a1a2e;border-top:1px solid #2a2a4a;font-size:0.78em;color:#888;display:flex;gap:20px}
.stats span{color:#7c8aff;font-weight:600}
.hint{color:#555;text-align:center;font-size:0.85em}
.bottom-note{margin-top:auto;font-size:0.68em;color:#555;text-align:center;padding-top:10px;border-top:1px solid #1f1f3a}
</style>
</head>
<body>

<div class="sidebar">
  <h2>⚙️ Vectorizer</h2>
  <p class="sub">K-Means + contours + SVG</p>

  <label>🎨 Max Colors</label>
  <div class="row"><input type="range" id="colors" min="2" max="256" value="16" oninput="document.getElementById('colorsVal').textContent=this.value"><span class="range-val" id="colorsVal">16</span></div>

  <label>🔍 Detail Level</label>
  <div class="row"><input type="range" id="detail" min="1" max="10" value="5" oninput="document.getElementById('detailVal').textContent=this.value"><span class="range-val" id="detailVal">5</span></div>

  <label>📐 Max Image Size (px)</label>
  <input type="number" id="maxSize" value="1024" min="256" max="4096" step="128">

  <label>🚀 Engine</label>
  <select id="engine" style="width:100%;background:#0f0f23;border:1px solid #2a2a4a;color:#e0e0e0;padding:5px 8px;border-radius:6px;font-size:0.85em">
    <option value="kmeans">🔬 K-Means (düz çizgi)</option>
    <option value="vtracer" selected>🎯 VTracer (spline eğri)</option>
  </select>

  <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
    <input type="checkbox" id="layered">
    📚 Renk Layer'lari (PPT/Illustrator)
  </label>

  <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
    <input type="checkbox" id="strokeEnabled" onchange="document.getElementById('strokeWidth').disabled=!this.checked">
    ✏️ Stroke
  </label>
  <input type="number" id="strokeWidth" value="0.5" min="0.1" max="5" step="0.1" disabled>

  <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
    <input type="checkbox" id="flattenGradients">
    🎯 Gradient → Düz Renk
  </label>

  <div class="bottom-note">
    Dual Engine: K-Means + VTracer
  </div>
</div>

<div class="main">
  <div class="toolbar">
    <label class="upload-btn">📁 Upload Image<input type="file" id="fileInput" accept="image/png,image/jpeg,image/jpg,image/webp,image/bmp" onchange="handleFile(this)"></label>
    <button class="btn-primary" id="vectorizeBtn" onclick="vectorize()" disabled>⚡ Vectorize</button>
    <button class="btn-secondary" onclick="downloadSVG()" id="downloadBtn" disabled>💾 Download SVG</button>
    <button class="btn-secondary" onclick="aiSimplify()" id="aiSimplifyBtn" disabled>✨ AI Simplify (Illustrator)</button>
    <span id="status" style="font-size:0.82em;color:#888;margin-left:auto"></span>
  </div>

  <div class="split">
    <div class="panel" id="input-panel">
      <div class="panel-label">📷 Original</div>
      <img id="preview" style="display:none" alt="Preview">
      <div id="dropHint" class="hint">Drop an image here<br>or click Upload</div>
    </div>
    <div class="panel" id="svg-panel">
      <div class="panel-label">🎯 SVG Result</div>
      <div id="svgContainer"></div>
    </div>
  </div>

  <div class="stats">
    <div>🎨 Colors: <span id="statColors">—</span></div>
    <div>📐 Paths: <span id="statPaths">—</span></div>
    <div>⏱️ Time: <span id="statTime">—</span>ms</div>
    <div>📏 Size: <span id="statSize">—</span></div>
  </div>
</div>

<script>
let resultSVG = null;
let selectedFile = null;

const dropZone = document.body;
dropZone.addEventListener('dragover', e => { e.preventDefault(); e.stopPropagation(); });
dropZone.addEventListener('drop', e => {
  e.preventDefault(); e.stopPropagation();
  if (e.dataTransfer.files.length > 0) {
    document.getElementById('fileInput').files = e.dataTransfer.files;
    handleFile(document.getElementById('fileInput'));
  }
});

function handleFile(input) {
  if (input.files.length === 0) return;
  selectedFile = input.files[0];
  document.getElementById('vectorizeBtn').disabled = false;
  document.getElementById('downloadBtn').disabled = true;
  document.getElementById('status').textContent = selectedFile.name;
  resultSVG = null;
  
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('preview').src = e.target.result;
    document.getElementById('preview').style.display = 'block';
    document.getElementById('dropHint').style.display = 'none';
    document.getElementById('svgContainer').innerHTML = '';
    document.getElementById('statColors').textContent = '—';
    document.getElementById('statPaths').textContent = '—';
    document.getElementById('statTime').textContent = '—';
    document.getElementById('statSize').textContent = '—';
  };
  reader.readAsDataURL(selectedFile);
}

async function vectorize() {
  if (!selectedFile) return;
  
  const btn = document.getElementById('vectorizeBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Processing...';
  document.getElementById('status').textContent = 'Vectorizing...';
  
  const formData = new FormData();
  formData.append('image', selectedFile);
  formData.append('maxColors', document.getElementById('colors').value);
  formData.append('detail', document.getElementById('detail').value);
  formData.append('maxImageSize', document.getElementById('maxSize').value);
  formData.append('strokeEnabled', document.getElementById('strokeEnabled').checked);
  formData.append('strokeWidth', document.getElementById('strokeWidth').value);
  formData.append('engine', document.getElementById('engine').value);
  formData.append('layered', document.getElementById('layered').checked);
  formData.append('flattenGradients', document.getElementById('flattenGradients').checked);
  
  try {
    const res = await fetch('/api/vectorize', { method: 'POST', body: formData });
    const data = await res.json();
    
    if (data.error) {
      document.getElementById('status').textContent = '❌ ' + data.error;
      btn.disabled = false;
      btn.textContent = '⚡ Vectorize';
      return;
    }
    
    resultSVG = data.svg;
    document.getElementById('svgContainer').innerHTML = data.svg;
    document.getElementById('downloadBtn').disabled = false;
    document.getElementById('aiSimplifyBtn').disabled = false;
    document.getElementById('statColors').textContent = data.colorCount;
    document.getElementById('statPaths').textContent = data.pathCount;
    document.getElementById('statTime').textContent = data.processingTime;
    document.getElementById('statSize').textContent = (new Blob([data.svg]).size / 1024).toFixed(1) + ' KB';
    document.getElementById('status').textContent = '✅ Done in ' + data.processingTime + 'ms';
    
  } catch (err) {
    document.getElementById('status').textContent = '❌ ' + err.message;
  }
  
  btn.disabled = false;
  btn.textContent = '⚡ Vectorize';
}

function downloadSVG() {
  if (!resultSVG) return;
  const blob = new Blob([resultSVG], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (selectedFile?.name || 'output').replace(/\.[^.]+$/, '') + '.svg';
  a.click();
  URL.revokeObjectURL(url);
}

async function aiSimplify() {
  if (!resultSVG) return;
  const btn = document.getElementById('aiSimplifyBtn');
  btn.disabled = true;
  btn.textContent = '⏳ AI Simplify...';
  document.getElementById('status').textContent = 'Illustrator işleniyor...';
  
  try {
    const fd = new FormData();
    fd.append('svg', resultSVG);
    const res = await fetch('/api/ai-simplify', { method: 'POST', body: fd });
    const data = await res.json();
    
    if (data.error) {
      document.getElementById('status').textContent = '❌ ' + data.error;
    } else {
      resultSVG = data.svg;
      document.getElementById('svgContainer').innerHTML = resultSVG;
      document.getElementById('statPaths').textContent = data.pathCount;
      document.getElementById('status').textContent = '✅ AI Simplify tamam (' + data.pathCount + ' path)';
    }
  } catch(e) {
    document.getElementById('status').textContent = '❌ Bağlantı hatası';
  }
  btn.disabled = false;
  btn.textContent = '✨ AI Simplify (Illustrator)';
}
</script>
</body>
</html>
